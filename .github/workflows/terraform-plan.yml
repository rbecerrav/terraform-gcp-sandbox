name: Terraform Plan

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write       # Required for Workload Identity Federation
  pull-requests: write  # Required to post plan as PR comment

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -lock-timeout=10m \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}"
        continue-on-error: true

      # Posts the plan output as a comment on the PR
      - name: Post Plan to PR
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const plan = process.env.PLAN_OUTPUT || '(no output)';
            const body = '#### Terraform Plan\n' +
              '```\n' + plan + '\n```\n' +
              '*Pushed by: @${{ github.actor }}, Action: `${{ github.event_name }}`*';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

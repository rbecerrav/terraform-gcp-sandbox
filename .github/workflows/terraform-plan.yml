name: Terraform Plan

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write       # Required for Workload Identity Federation
  pull-requests: write  # Required to post plan as PR comment

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve latest image from Artifact Registry
        id: image
        run: |
          REGISTRY="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/docker-images/session-service-api"

          TAG=$(gcloud artifacts docker tags list "${REGISTRY}" \
            --sort-by="~createTime" \
            --filter="tag!=latest" \
            --limit=1 \
            --format="value(tag)")

          if [ -z "$TAG" ]; then
            echo "::error::No image tags found in Artifact Registry for ${REGISTRY}"
            exit 1
          fi

          FULL_IMAGE="${REGISTRY}:${TAG}"
          echo "image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Resolved image: ${FULL_IMAGE}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="session_service_image=${{ steps.image.outputs.image }}"
        continue-on-error: true

      # Posts the plan output as a comment on the PR
      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan 📖
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

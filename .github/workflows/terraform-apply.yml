name: Terraform Apply

on:
  push:
    branches:
      - main  # Triggered only after a PR is merged (approved + merged = apply)
  workflow_dispatch:  # Allow manual trigger (e.g. to deploy a specific image SHA)
    inputs:
      session_service_image:
        description: "Full image URI to deploy (e.g. .../session-service-api:abc1234). Leave empty to use the SECRET default."
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production  # Optional: adds a manual approval gate in GitHub Environments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          IMAGE="${{ github.event.inputs.session_service_image }}"
          if [ -z "$IMAGE" ]; then
            IMAGE="${{ secrets.SESSION_SERVICE_IMAGE }}"
          fi
          terraform apply -auto-approve \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="session_service_image=${IMAGE}"

name: Terraform Apply

on:
  push:
    branches:
      - main  # Triggered only after a PR is merged (approved + merged = apply)
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  id-token: write
  pull-requests: write  # Required to post apply result as PR comment

# Un solo apply corre a la vez. cancel-in-progress: false encola el siguiente
# en lugar de cancelarlo — necesario cuando se mergean PRs seguidos.
concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production  # Optional: adds a manual approval gate in GitHub Environments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        id: apply
        continue-on-error: true
        run: |
          terraform apply -auto-approve -no-color -lock-timeout=15m \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}"

      - name: Post Apply to PR
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha
            });
            if (prs.data.length === 0) return;
            const outcome = '${{ steps.apply.outcome }}';
            const status = outcome === 'success' ? '✅' : '❌';
            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            const sha = context.sha.substring(0, 7);
            const body = '#### Terraform Apply ' + status + '\n' +
              '**Run:** [#${{ github.run_number }}](' + runUrl + ')\n' +
              '**Commit:** `' + sha + '` pushed by @${{ github.actor }}\n' +
              '**Status:** ' + outcome;
            await github.rest.issues.createComment({
              issue_number: prs.data[0].number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Apply Status
        if: steps.apply.outcome == 'failure'
        run: exit 1

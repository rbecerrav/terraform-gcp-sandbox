name: Terraform Apply

on:
  push:
    branches:
      - main  # Triggered only after a PR is merged (approved + merged = apply)
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production  # Optional: adds a manual approval gate in GitHub Environments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve latest image from Artifact Registry
        id: image
        run: |
          REGISTRY="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/docker-images/session-service-api"

          # Get the most recently pushed tag (excluding 'latest')
          TAG=$(gcloud artifacts docker tags list "${REGISTRY}" \
            --sort-by="~createTime" \
            --filter="tag!=latest" \
            --limit=1 \
            --format="value(tag)")

          if [ -z "$TAG" ]; then
            echo "::error::No image tags found in Artifact Registry for ${REGISTRY}"
            exit 1
          fi

          FULL_IMAGE="${REGISTRY}:${TAG}"
          echo "image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Resolved image: ${FULL_IMAGE}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="session_service_image=${{ steps.image.outputs.image }}"

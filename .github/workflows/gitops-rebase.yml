name: GitOps Rebase

# Se dispara cuando un PR de GitOps se mergea a main y actualiza image_tags.auto.tfvars.
# Hace rebase de todas las branches gitops/* abiertas sobre el nuevo main para evitar
# conflictos de merge en los PRs restantes.
#
# Por qué el rebase funciona sin conflictos: cada branch gitops/* solo modifica
# una línea diferente del archivo (una por servicio), por lo que git puede
# aplicar los cambios automáticamente sin intervención manual.

on:
  push:
    branches:
      - main
    paths:
      - image_tags.auto.tfvars

permissions:
  contents: write
  pull-requests: read

jobs:
  rebase:
    name: Rebase open GitOps PRs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT requerido — GITHUB_TOKEN no dispara pull_request events en los PRs
          # actualizados, por lo que terraform-plan no correría tras el rebase.
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rebase open GitOps branches onto main
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git fetch --all --prune

          branches=$(gh pr list --base main --json headRefName \
            --jq '.[] | select(.headRefName | startswith("gitops/")) | .headRefName')

          if [ -z "$branches" ]; then
            echo "No open GitOps PRs to rebase."
            exit 0
          fi

          for branch in $branches; do
            echo "→ Rebasing $branch onto main..."
            git checkout -B "$branch" "origin/$branch"

            if git rebase origin/main; then
              git push origin "$branch" --force-with-lease
              echo "  ✓ Updated $branch"
            else
              git rebase --abort
              echo "  ✗ Could not rebase $branch automatically — skipping (requires manual resolution)"
            fi
          done
